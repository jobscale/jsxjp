app = "jsxjp"
primary_region = "nrt"

[build]
image = "ghcr.io/jobscale/jsxjp:latest"

[[services]]
internal_port = 3_000
protocol = "tcp"

  [[services.ports]]
  handlers = [ "http" ]
  port = 80

  [[services.ports]]
  handlers = [ "tls", "http" ]
  port = 443

[[vm]]
memory = "256mb"
size = "shared-cpu-1x"

[scale]
count = 1
